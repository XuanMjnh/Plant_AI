name: plant_disease_ai
description: Flutter app demo - plant disease classification with TensorFlow Lite
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Chọn ảnh/camera
  image_picker: ^1.0.7

  # Đọc/resize ảnh
  image: ^4.2.0

  # Chạy TensorFlow Lite
  tflite_flutter: ^0.12.1

  # UI
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true

  assets:
    - assets/models/
    - assets/data/
